server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────
    # Cuts the JS bundle from ~634KB to ~180KB on the wire — the single
    # biggest win for page reload speed.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        application/wasm;

    # Docker's embedded DNS — resolve "backend" at request time so this
    # container always boots even if the backend isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── API proxy ────────────────────────────────────────────────
    location /api/ {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        # SSE requires these:
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        # Keep long-lived SSE connections open.
        proxy_read_timeout 1h;
    }

    # ── Static build assets ──────────────────────────────────────
    # Vite emits content-hashed filenames, so cache them hard — the browser
    # then won't re-download the JS/CSS on every reload.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
